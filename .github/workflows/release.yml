name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Neutralino CLI
        run: npm install -g @neutralinojs/neu

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:fresh

      - name: Verify RPC bridge binary
        run: |
          if (!(Test-Path "rpc-bridge.exe")) { throw "rpc-bridge.exe not found" }
          if (!(Test-Path "dist/nikkepwned/rpc-bridge.exe")) { throw "dist/nikkepwned/rpc-bridge.exe not found" }

      - name: Read version
        id: pkg
        run: |
          $version = node -p "require('./package.json').version"
          "version=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create tag
        run: |
          $tag = "${{ steps.pkg.outputs.version }}"
          $exists = git ls-remote --tags origin $tag
          if ($exists) {
            Write-Host "Tag already exists"
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}
          name: ${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: dist/nikkepwned-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
