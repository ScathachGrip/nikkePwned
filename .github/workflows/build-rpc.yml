name: Build RPC

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build RPC Bridge Executable
        run: npm run build:rpc

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpc-bridge-exe
          path: rpc-bridge.exe
